<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg-construction-4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-construction-4">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="card-construction-4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg-construction-4)"/>
  
  <!-- Product card -->
  <rect x="40" y="20" width="320" height="200" rx="12" fill="url(#card-construction-4)" filter="url(#shadow-construction-4)"/>
  
  <!-- Product emoji icon -->
  <text x="200" y="130" font-family="Arial, sans-serif" font-size="90" text-anchor="middle" dominant-baseline="central">⚙️</text>
  
  <!-- Brand badge top-left -->
  <rect x="15" y="15" rx="6" ry="6" width="90" height="28" fill="white" opacity="0.95"/>
  <text x="60" y="34" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1B5E20">Bosch</text>
  
  <!-- Category badge top-right -->
  <rect x="280" y="15" rx="6" ry="6" width="85" height="22" fill="white" opacity="0.25"/>
  <text x="322" y="30" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">angle grinder</text>
  
  <!-- Product name -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Bosch GWS 24-230</text>
  
  <!-- Specs -->
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.85">2400W | 230mm</text>
  
  <!-- Price -->
  <rect x="130" y="275" rx="8" ry="8" width="140" height="20" fill="#FFC107" opacity="0.95"/>
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">$229</text>
</svg>